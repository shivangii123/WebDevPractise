    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: 'Franklin Gothic Medium';
            box-sizing: border-box;
        }
        html, body{
            width: 100%;
            height: 100%;
        }
        input{
            padding: 5px;
            display: block;
            margin: 4px;
            border-radius: 4px;
        }
        #main{
            padding: 10px;
            width: 100%;
            height: 100%;
            background-color: black;
        }
        .card{
            display: inline-block;
            margin-top: 50px;
            align-items: center ;
            border: 2px solid rgb(255, 255, 255);
            border-radius: 10px;
            background-color: rgb(125, 128, 131);
            max-width: 200px;   
            color: rgb(34, 37, 37);
        }
        .profile{
            height: 60px;
            width: 60px ;
            border-radius: 50%;
            margin-bottom: 6px;
            overflow: hidden;
        }
        .profile img{
            height: 100%;
            width: 100%;
            object-fit: cover;

        }
    </style>
</head>
