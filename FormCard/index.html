<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: 'Franklin Gothic Medium';
            box-sizing: border-box;
        }
        html, body{
            width: 100%;
            height: 100%;
        }
        input{
            padding: 5px;
            display: block;
            margin: 4px;
            border-radius: 4px;
        }
        #main{
            padding: 10px;
            width: 100%;
            height: 100%;
            background-color: black;
        }
        form{
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Cards layout */
        .cardContainer{
            display: flex;
            flex-wrap: wrap;        /* important */
            gap: 20px;
            justify-content: center;
        }
        .card{
            display: inline-block;
            border: 2px solid rgb(255, 255, 255);
            border-radius: 10px;
            background-color: rgb(125, 128, 131);
            max-width: 200px;   
            color: rgb(34, 37, 37);
            padding: 10px;         
            overflow: hidden;       /* prevents overflow */
            word-wrap: break-word;  /* breaks long text */
        }
        .profile{
            height: 60px;
            width: 60px ;
            border-radius: 50%;
            margin-bottom: 6px;
            overflow: hidden;
        }
        .profile img{
            height: 100%;
            width: 100%;
            object-fit: cover;
        }
        .card h3, 
        .card h5, 
        .card p {
            margin: 5px 0;
            word-break: break-word;   /* handles long strings */
        }
        
    </style>
</head>
<body>
    <div id="main">
        <form action="">
            <input type="text" class="inp" placeholder="type image url...">
            <input type="text" class="inp" placeholder="type name...">
            <input type="text" class="inp" placeholder="type profession...">
            <input type="text" class="inp" placeholder="Something about You...">
            <input type="submit" id="sbm" >
        </form>
