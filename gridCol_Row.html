<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container{
            display: grid;
            /* background-color: rgb(178, 138, 216); */
            height: 400px;
            width: 400px;
            margin: auto;
            margin-top: 80px;
            grid-template-columns: repeat(4,1fr);
            grid-template-rows: repeat(4,1fr);
        }
        .div1{
            background-color: #c99e76;
            grid-column: 1/2;
            grid-row: 1/3;
        }
        .div2{
            background-color: #7558aa;
            grid-column: 2/4;
            grid-row: 1/4;
        }
        .div3{
            background-color: #eaec4f;
            grid-column: 4/5;
            grid-row: 1/2;
        }
        .div4{
            background-color: #5ea8ca;
            /* grid-column: 4/5; */
            /* grid-row: 2/5; */ 
                    /* or */
            grid-column: -1/-2;
            grid-row: -1/-4;
        }
        .div5{
            background-color: #d09eda;
            grid-column: 1/4;
            grid-row: 4/5;
        }
        .div6{
            background-color: #20b362;
            grid-column: 1/2;
            grid-row: 3/4;
        } 
        
        .div{
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="div div1">1</div>
        <div class="div div2">2</div>
        <div class="div div3">3</div>
        <div class="div div4">4</div>
        <div class="div div5">5</div>
        <div class="div div6">6</div>

    </div>

</body>
</html>
