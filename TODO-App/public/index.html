<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoApp</title>
    <link rel="stylesheet" href="./style.css">
    
    <!-- Axios is included before script.js file, thus I can use it inside the script -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

    <div class="container">
        <h1> Todo App </h1>

        <form action="" id="task-form">
            <input type="text" id="task-input" placeholder="Add a new task..." required >
            <button type="submit" id="submit-btn"> Add Task</button>
        </form>

        <div class="filter-btns"> 
            <button id="filter-all" class="active"> All </button>
            <button id="filter-active"> Active </button>
            <button id="filter-completed"> Completed </button>
        </div>

        <ul class="taskList">
            <!-- <li>
                <span class="task-text"> ${d.taskName}</span>
                <div class="task-actions">
                    <button class="completed-btn"> ${d.status ?'Pending': 'Completed'}</button>
                    <button class="edit-btn">Edit</button>
                    <button class="delete-btn">Delete</button>
                </div>
            </li> -->

        </ul>

        <button id="clear-completed"> Clear completed</button>

        <script src="/script.js"></script>
    </div>



</body>
</html>
